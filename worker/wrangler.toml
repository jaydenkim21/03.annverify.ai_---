# ⑥ Infrastructure Layer — Cloudflare Worker 배포 설정
# wrangler deploy 명령 전에 name과 account_id를 실제 값으로 수정하세요

name       = "ann-proxy"
main       = "worker-v4.js"
compatibility_date = "2024-09-23"
account_id = "2b10ac43a3fe8ddb0d93bd28f06338b2"

[placement]
mode = "smart"

# Custom Domain — annverify.ai
[[routes]]
pattern = "api.annverify.ai"
custom_domain = true

# Secrets (wrangler secret put 명령으로 등록):
